<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Venkat Jaswanth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      }

      .card {
        background: white;
        padding: 40px 60px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      }

      h1 {
        font-size: 28px;
        font-weight: 600;
        color: #333;
        margin-bottom: 10px;
      }

      p {
        font-size: 16px;
        color: #666;
        letter-spacing: 1px;
      }

      .roll {
        margin-top: 15px;
        padding: 8px 16px;
        display: inline-block;
        background: #f1f3f8;
        border-radius: 8px;
        font-weight: 500;
        color: #444;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Venkat Jaswanth</h1>
      <p>Roll Number</p>
      <div class="roll">2023BCD0021</div>
    </div>
  </body>
</html>
